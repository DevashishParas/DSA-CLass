<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" >

<link rel="stylesheet" href="canvagpt.css">

<title>Canva Clone</title>
</head>
<body>

<!-- Top Navbar -->
<nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container-fluid">
        <a class="navbar-brand text-white fw-bold" href="#">File</a>

        <div class="ms-auto d-flex gap-3 align-items-center">
            <button class="btn btn-light">Present</button>
            <button class="btn btn-light">Share</button>
        </div>
    </div>
</nav>

<div class="main-wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="search-box">
            <input
                type="text"
                class="form-control"
                placeholder="Describe your ideal design">
        </div>

        <div class="d-grid gap-2 mt-3">
            <button class="btn btn-light">Generate</button>
            <button class="btn btn-primary">Search</button>
        </div>

        <h6 class="mt-4">Recently Used</h6>

        <div class="template-grid">
            <div class="template-card"></div>
            <div class="template-card"></div>
            <div class="template-card"></div>
            <div class="template-card"></div>
            <div class="template-card"></div>
            <div class="template-card"></div>
        </div>

    </aside>

    <!-- Workspace -->
    <section class="workspace">

        <!-- Floating Toolbar -->
        <div class="toolbar shadow">
            <button class="btn btn-sm">Edit</button>
            <button class="btn btn-sm">Effects</button>
            <button class="btn btn-sm">Animate</button>
            <button class="btn btn-sm">Position</button>
        </div>

        <!-- Canvas -->
        <div class="canvas shadow">

            <!-- Row 1 -->
            <div class="circle"></div>

            <div class="square"></div>

            <div class="triangle"></div>

            <div class="pentagon"></div>

            <!-- Row 2 -->

            <div class="plus"></div>

            <div class="parallelogram"></div>

            <div class="arrow-up"></div>

            <div class="heart"></div>

        </div>

    </section>

</div>

</body>
</html>
