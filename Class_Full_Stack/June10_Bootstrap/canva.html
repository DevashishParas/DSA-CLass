<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva Clone</title>

    <link rel="stylesheet" href="canva.css">

    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
        <nav>
            <div class="left">

                <a href="">File</a>
                <a href="">Resize</a>

                <div class="down">
                    <i class="fa-solid fa-pen"></i>
                    Editing
                    <i class="fa-solid fa-angle-down"></i>
                </div>

                <i class="fa-solid fa-rotate-left icon"></i>
                <i class="fa-solid fa-rotate-right icon"></i>

                <i class="fa-solid fa-cloud-arrow-up icon" ></i>

            </div>

            <div class="center">

                <span class="sample">Sample</span>

                <button class="btn">
                    👑 Start your trial for ₹0
                </button>

                <div class="small-icon profile">
                    <img src="pimage1.jpg"">
                </div>

                <div class="small">
                    <i class="fa-solid fa-chart-simple"></i>
                </div>

                <div class="small">
                    <i class="fa-regular fa-comment"></i>
                </div>

                <button class="present">
                    Present
                    <i class="fa-solid fa-angle-down"></i>
                </button>

                <button class="share">
                    Share
                </button>

            </div>

        </nav>
        <div class="main_container">
            <!-- Sidebar-->
            <div class="sidebar">
                <div class="item active">
                    <i class="fa-solid fa-table-columns"></i>
                    <span>Templates</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-shapes"></i>
                    <span>Elements</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-t"></i>
                    <span>Text</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-camera"></i>
                    <span>Brand</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span>Uploads</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-pen-ruler"></i>
                    <span>Tools</span>
                </div>
                <div class="item">
                    <i class="fa-regular fa-folder"></i>
                    <span>Projects</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-table-cells-large"></i>
                    <span>Apps</span>
                </div>                                                                                                         
                <div class="item">
                    <i class="fa-regular fa-image"></i>
                    <span>Magic Media</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-music"></i>
                    <span>Audio</span>
                </div>
                <div class="item">
                    <i class="fa-regular fa-circle"></i>
                    <span>Videoforme</span>
                </div>
            </div>
            <!-- left --> 
           <div class="left-panel">
                <div class="search-section">
                    <div class="search-box">
                        <i class="fa-solid fa-plus"></i>
                        <input type="text"
                        placeholder="Describe your ideal design">
                        <i class="fa-solid fa-microphone"></i>
                    </div>
                    <div class="btn-group">
                        <button class="generate-btn">
                            ✨ Generate
                        </button>
                        <button class="search-btn">
                            Search
                        </button>
                    </div>
                </div>
                <div class="recent-head">
                    <h3>Recently used</h3>
                    <span>See all</span>
                </div>
                <div class="recent-grid">
                    <div class="recent-card">
                        <img src="i1.jpg" alt="">
                    </div>
                    <div class="recent-card">
                        <img src="i2.jpg" alt="">

                    </div>
                </div>
                <h3 class="all-result-title">
                    All results
                </h3>
                <div class="template-grid">
                    <div class="template-card">
                        <img src="i3.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="i4.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="i5.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="i6.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="i7.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="i8.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="i9.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="i10.jpg" alt="">
                    </div>
                </div>
            </div>
            <div class="workspace">

                <div class="top-toolbar">
                    <span>Edit</span>
                    <div class="red-color"></div>
                    <i class="fa-solid fa-bars"></i>
                    <i class="fa-solid fa-arrow-rotate-left"></i>
                    <i class="fa-solid fa-grip"></i>

                    <span>Effects</span>
                    <span>Animate</span>
                    <span>Position</span>

                    <i class="fa-solid fa-paint-roller"></i>
                </div>

                <div class="canvas">

                    <div class="circle"></div>

                    <div class="square"></div>

                    <div class="triangle"></div>

                    <div class="pentagon"></div>

                    <div class="plus-shape"></div>

                    <div class="parallelogram"></div>

                    <div class="arrow-up"></div>

                    <div class="heart-box">
                        <div class="heart"></div>
                    </div>

                </div>

        

            </div>

              <!-- FOOTER START -->

        <footer class="footer">

            <div class="footer-left">
                <div class="footer-item">
                    <i class="fa-solid fa-pen-to-square"></i>
                    <span>Notes</span>
                </div>

                <div class="footer-item">
                    <i class="fa-regular fa-clock"></i>
                    <span>Timer</span>
                </div>
            </div>

            <div class="footer-center">

                <div class="page-preview">

                    <div class="thumb">

                        <div class="mini-circle"></div>
                        <div class="mini-square"></div>
                        <div class="mini-triangle"></div>
                        <div class="mini-pentagon"></div>

                        <div class="mini-plus">+</div>
                        <div class="mini-para"></div>
                        <div class="mini-arrow">↑</div>
                        <div class="mini-heart">❤</div>

                    </div>

                    <div class="page-number">1</div>

                </div>

                <button class="add-page">+</button>

                <button class="dropdown-btn">
                    <i class="fa-solid fa-angle-down"></i>
                </button>

            </div>

            <div class="footer-right">

                <div class="zoom-control">

                    <div class="zoom-track">
                        <div class="zoom-thumb"></div>
                    </div>

                    <span>53%</span>

                </div>

                <div class="pages-btn">
                    <i class="fa-regular fa-window-maximize"></i>
                    <span>Pages</span>
                </div>

                <div class="page-count">
                    1 / 1
                </div>

                <i class="fa-solid fa-table-cells-large"></i>

                <i class="fa-solid fa-expand"></i>

                <i class="fa-regular fa-trash-can"></i>

            </div>

        </footer>

        <!-- FOOTER END -->
        </div>


        


      
</body>
</html>
