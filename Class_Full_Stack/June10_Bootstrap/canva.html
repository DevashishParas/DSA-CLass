<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canva Clone</title>

<link rel="stylesheet" href="canva.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<nav>

<div class="nav-left">

<a href="#">File</a>
<a href="#">Resize</a>

<div class="editing">
<i class="fa-solid fa-pen"></i>
<span>Editing</span>
<i class="fa-solid fa-angle-down"></i>
</div>

<i class="fa-solid fa-rotate-left"></i>
<i class="fa-solid fa-rotate-right"></i>
<i class="fa-solid fa-cloud-arrow-up"></i>

</div>

<div class="nav-right">

<span class="sample">Sample</span>

<button class="trial-btn">
👑 Start your trial for ₹0
</button>

<div class="avatar"></div>

<div class="icon-btn">
<i class="fa-solid fa-chart-simple"></i>
</div>

<div class="icon-btn">
<i class="fa-regular fa-comment"></i>
</div>

<button class="present-btn">
Present
<i class="fa-solid fa-angle-down"></i>
</button>

<button class="share-btn">
Share
</button>

</div>

</nav>

<div class="app">

<!-- Sidebar -->

<div class="sidebar">

<div class="side-item active">
<i class="fa-solid fa-table-columns"></i>
<span>Templates</span>
</div>

<div class="side-item">
<i class="fa-solid fa-shapes"></i>
<span>Elements</span>
</div>

<div class="side-item">
<i class="fa-solid fa-t"></i>
<span>Text</span>
</div>

<div class="side-item">
<i class="fa-solid fa-camera"></i>
<span>Brand</span>
</div>

<div class="side-item">
<i class="fa-solid fa-cloud-arrow-up"></i>
<span>Uploads</span>
</div>

<div class="side-item">
<i class="fa-solid fa-pen-ruler"></i>
<span>Tools</span>
</div>

<div class="side-item">
<i class="fa-regular fa-folder"></i>
<span>Projects</span>
</div>

<div class="side-item">
<i class="fa-solid fa-table-cells-large"></i>
<span>Apps</span>
</div>

<div class="side-item">
<i class="fa-regular fa-image"></i>
<span>Magic Media</span>
</div>

<div class="side-item">
<i class="fa-solid fa-music"></i>
<span>Audio</span>
</div>

<div class="side-item">
<i class="fa-regular fa-circle"></i>
<span>Videoforme</span>
</div>

</div>

<!-- Left Panel -->

<div class="left-panel">

<div class="search-box">

<i class="fa-solid fa-plus"></i>

<input type="text" placeholder="Describe your ideal design">

<i class="fa-solid fa-microphone"></i>

</div>

<div class="action-buttons">

<button>✨ Generate</button>
<button class="purple">Search</button>

</div>

<div class="heading-row">
<h3>Recently used</h3>
<span>See all</span>
</div>

<div class="recent-grid">

<div class="placeholder"></div>
<div class="placeholder"></div>

</div>

<h3 class="all-results">All results</h3>

<div class="template-grid">

<div class="placeholder"></div>
<div class="placeholder"></div>
<div class="placeholder"></div>
<div class="placeholder"></div>
<div class="placeholder"></div>
<div class="placeholder"></div>
<div class="placeholder"></div>
<div class="placeholder"></div>

</div>

</div>

<!-- Workspace -->

<div class="workspace">

<div class="toolbar">

<span>Edit</span>

<div class="color-dot"></div>

<i class="fa-solid fa-bars"></i>
<i class="fa-solid fa-arrow-rotate-left"></i>
<i class="fa-solid fa-grip"></i>

<span>Effects</span>
<span>Animate</span>
<span>Position</span>

<i class="fa-solid fa-paint-roller"></i>

</div>

<div class="canvas">

<div class="circle"></div>
<div class="square"></div>
<div class="triangle"></div>
<div class="pentagon"></div>

<div class="plus"></div>

<div class="parallelogram"></div>

<div class="arrow"></div>

<div class="heart-box">
<div class="heart"></div>
</div>

</div>

</div>

</div>

</body>
</html>
