```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Insurance Portal</title>

    <link rel="stylesheet" href="OIP.css">
</head>

<body>

    <!-- Navigation -->
    <nav>
        <h2>Insurance Portal</h2>

        <ul>
            <li>Home</li>
            <li>Policies</li>
            <li>Calculator</li>
            <li>Contact</li>
        </ul>

        <button class="btn" id="darkModeBtn">
            🌙 Dark Mode
        </button>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Online Insurance Portal</h1>
        <p>Protect Your Future With The Right Insurance Plan</p>
    </section>

    <!-- Insurance Plans -->
    <div class="container">

        <h2 class="section-title">Search Insurance Plans</h2>

        <input
            type="text"
            id="search"
            placeholder="Search Policy..."
        >

        <br><br>

        <button class="btn" id="sortBtn">
            Sort by Premium
        </button>

        <select id="filterPremium">

            <option value="all">
                All Premiums
            </option>

            <option value="500">
                Under ₹500
            </option>

            <option value="700">
                ₹500 - ₹700
            </option>

            <option value="1000">
                Above ₹700
            </option>

        </select>

        <p id="policyCount"></p>

        <div id="loading">
            Loading Policies...
        </div>

        <div class="cards" id="plans"></div>

    </div>

    <!-- Premium Calculator -->
    <div class="calculator">

        <h2>Premium Calculator</h2>

        <input
            type="number"
            id="age"
            placeholder="Enter Your Age"
        >

            <button
            class="btn"
            id="calculateBtn">

            Calculate Premium

            </button>

        <div
            class="result"
            id="premiumResult">
        </div>

    </div>

    <!-- Contact Form -->
    <div class="contact">

        <h2>Contact Us</h2>

        <input
            type="text"
            id="name"
            placeholder="Your Name"
        >

        <input
            type="email"
            id="email"
            placeholder="Your Email"
        >

        <textarea
            rows="5"
            id="message"
            placeholder="Message">
        </textarea>

        <button
            class="btn"
            id="submitBtn">

            Submit

        </button>

        <p id="formMessage"></p>

    </div>

    <footer>
        © 2026 Online Insurance Portal
    </footer>

    <script src="OIP2.js"></script>

</body>

</html>
```
